name: Build & deploy rugby rankings

# Rebuilds the dashboard from the ESPN source and publishes it to GitHub Pages.
on:
  push:
    branches: [main]          # rebuild on every code change
  schedule:
    - cron: "0 6 * * *"       # and daily at 06:00 UTC to pick up new results
  workflow_dispatch:           # ...and on demand from the Actions tab

# Permissions the deploy-pages action needs
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; newer runs supersede older ones
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh results from ESPN
        run: python update_data.py

      - name: Build dashboard
        run: python build_site.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
